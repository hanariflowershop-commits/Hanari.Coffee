<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Permitimos el escalado nativo si el usuario lo desea, pero controlaremos el zoom de la imagen por JS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú Hanari Coffee</title>
    
    <!-- Cargamos PinchZoom desde un CDN confiable para gestionar los gestos táctiles y el ratón de forma fluida -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pinch-zoom-js/2.3.4/pinch-zoom.min.js"></script>

    <style>
        /* Estilos generales */
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1512;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            /* Cambiado a dinámico para permitir scroll cuando esté abierto si es necesario */
            overflow: hidden; 
        }

        body.menu-abierto {
            overflow: auto;
        }

        /* CONTENEDOR PRINCIPAL DEL PERGAMINO */
        .pergamino-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: transform 0.5s ease;
        }

        /* El cuerpo del pergamino (la imagen del menú) */
        .pergamino-cuerpo {
            max-width: 85vw;
            max-height: 80vh;
            width: 0px; /* Inicia cerrado */
            overflow: hidden;
            transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 4px solid #8B4513;
            border-bottom: 4px solid #8B4513;
        }

        /* Contenedor específico para el área de zoom */
        .zoom-wrapper {
            width: 100%;
            height: 80vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* La imagen dentro del pergamino */
        .pergamino-cuerpo img {
            height: 80vh;
            width: auto;
            display: block;
            /* Se activa la interacción para el zoom una vez abierto */
            pointer-events: none; 
            max-width: none;
        }

        .pergamino-container.abierto .pergamino-cuerpo img {
            pointer-events: auto;
        }

        /* Los rodillos de madera laterales */
        .rodillo {
            width: 25px;
            height: calc(80vh + 20px);
            background: linear-gradient(to right, #5c2c16, #8B4513, #5c2c16);
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 10;
            cursor: pointer; /* Indica que se puede hacer click en los extremos */
        }

        .rodillo::before, .rodillo::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 31px;
            height: 15px;
            background: linear-gradient(to right, #b8860b, #ffd700, #b8860b);
            border-radius: 3px;
        }
        .rodillo::before { top: -15px; }
        .rodillo::after { bottom: -15px; }

        /* Cuando el pergamino está ABIERTO */
        .pergamino-container.abierto .pergamino-cuerpo {
            width: 100%; 
        }

        /* Indicador o botón flotante */
        .instruccion {
            position: absolute;
            bottom: -40px;
            color: #f5f5dc;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 1px 2px black;
            transition: opacity 0.5s;
            white-space: nowrap;
            pointer-events: none;
        }

        .pergamino-container.abierto .instruccion {
            opacity: 0.5;
        }

        /* ========================================================
           TRUCO CSS: FORZAR ROTACIÓN EN PANTALLAS VERTICALES (MÓVILES)
           ======================================================== */
        @media (max-width: 768px) and (orientation: portrait) {
            .pergamino-container {
                transform: rotate(90deg);
                transform-origin: center center;
            }

            .pergamino-cuerpo {
                max-width: 80vh;  
                max-height: 85vw; 
            }

            .zoom-wrapper {
                height: 85vw;
            }

            .pergamino-cuerpo img {
                height: 85vw; 
                width: auto;
            }

            .rodillo {
                height: calc(85vw + 20px);
            }

            .instruccion::after {
                content: " 🔄 (Usa 2 dedos para hacer zoom)";
                display: block;
                font-size: 0.8rem;
                color: #ffb74d;
                text-align: center;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="pergamino-container">
        <!-- Rodillo Izquierdo (Mantiene el click de abrir/cerrar) -->
        <div class="rodillo" onclick="togglePergamino()"></div>

        <!-- Cuerpo del pergamino -->
        <div class="pergamino-cuerpo">
            <!-- Envase específico que controlará la librería de Zoom -->
            <div class="zoom-wrapper" id="zoom-area">
                <img src="Hanari%20Images/menu%20image.jpeg" alt="Menú Hanari Coffee" id="menu-img">
            </div>
        </div>

        <!-- Rodillo Derecho (Mantiene el click de abrir/cerrar) -->
        <div class="rodillo" onclick="togglePergamino()"></div>

        <!-- Texto de guía -->
        <div class="instruccion" id="texto-guia">Click en los rodillos para Abrir / Cerrar</div>
    </div>

    <script>
        let pzInstance = null;

        // Inicializamos el sistema de zoom de manera controlada
        function inicializarZoom() {
            const el = document.getElementById('zoom-area');
            if (el && !pzInstance) {
                pzInstance = new PinchZoom(el, {
                    tapZoomFactor: 2,
                    maxZoom: 4,
                    minZoom: 1,
                    draggableUnzoomed: false // Evita que se mueva la imagen si no tiene zoom
                });
            }
        }

        function togglePergamino() {
            const container = document.querySelector('.pergamino-container');
            const instruccion = document.getElementById('texto-guia');
            const estaAbierto = container.classList.toggle('abierto');
            
            if (estaAbierto) {
                document.body.classList.add('menu-abierto');
                instruccion.textContent = "Usa tus dedos o ratón para hacer Zoom";
                
                // Esperamos a que la animación de apertura termine (1.5s) para activar el zoom de forma limpia
                setTimeout(() => {
                    inicializarZoom();
                }, 1500);
            } else {
                document.body.classList.remove('menu-abierto');
                instruccion.textContent = "Click en los rodillos para Abrir / Cerrar";
                
                // Si se cierra, reseteamos el zoom para que vuelva a su tamaño original
                if (pzInstance) {
                    pzInstance.setTransform({
                        x: 0,
                        y: 0,
                        scale: 1,
                        animate: true
                    });
                }
            }
        }
    </script>

</body>
</html>
